<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <filter id="g" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.4" result="b" />
      <feMerge>
        <feMergeNode in="b" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <rect width="64" height="64" rx="14" fill="#0a1410" />

  <!-- the active spanning tree: glowing green forwarding links from the gold root -->
  <g filter="url(#g)" stroke-linecap="round" fill="none">
    <path d="M32 16 L18 34" stroke="#34d27a" stroke-width="3" />
    <path d="M32 16 L46 34" stroke="#34d27a" stroke-width="3" />
    <path d="M18 34 L26 50" stroke="#34d27a" stroke-width="3" />
    <!-- the one blocked rung that breaks the loop -->
    <path d="M46 34 L26 50" stroke="#ff5a52" stroke-width="3" stroke-dasharray="3 4" opacity="0.85" />
  </g>

  <!-- bridges -->
  <g filter="url(#g)">
    <circle cx="32" cy="16" r="6" fill="#ffc24b" />
    <circle cx="18" cy="34" r="5" fill="#cfe8da" />
    <circle cx="46" cy="34" r="5" fill="#cfe8da" />
    <circle cx="26" cy="50" r="5" fill="#cfe8da" />
  </g>
</svg>
